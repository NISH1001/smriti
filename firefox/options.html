<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body { font: 15px system-ui, -apple-system, sans-serif; margin: 20px; max-width: 520px; color: #111; }
      h2 { margin: 0 0 4px; }
      label { display: block; margin: 18px 0 6px; font-weight: 600; }
      input { font-size: 16px; padding: 8px 10px; width: 110px; border: 1px solid #bbb; border-radius: 8px; }
      button { font-size: 15px; font-weight: 600; padding: 10px 18px; margin-top: 18px; border: none;
               border-radius: 10px; background: #89b4ff; color: #0b1220; cursor: pointer; }
      .hint { color: #666; font-size: 13px; margin: 6px 0 0; }
      #status { margin-left: 10px; color: #2e7d32; }
      @media (prefers-color-scheme: dark) {
        body { background: #14161a; color: #e6e6e6; }
        input { background: #1e2128; color: #e6e6e6; border-color: #333; }
        .hint { color: #999; }
      }
    </style>
  </head>
  <body>
    <h2>Smriti</h2>
    <label for="chunk">Max snippets per send</label>
    <input type="number" id="chunk" min="1" max="200" />
    <p class="hint">
      Large batches are split into sends of this many snippets, to stay under the
      <code>smriti://</code> deep-link size limit. Default 50.
    </p>
    <div>
      <button id="save">Save</button>
      <span id="status"></span>
    </div>
    <script src="options.js"></script>
  </body>
</html>
